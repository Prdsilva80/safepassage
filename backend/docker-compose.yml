services:
  api:
    build: .
    container_name: safepassage_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [safepassage]
  postgres:
    image: postgres:16-alpine
    container_name: safepassage_postgres
    environment:
      POSTGRES_DB: safepassage
      POSTGRES_USER: safepassage
      POSTGRES_PASSWORD: safepassage_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepassage -d safepassage"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks: [safepassage]
  redis:
    image: redis:7-alpine
    container_name: safepassage_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks: [safepassage]
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: safepassage_translate
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,ar,uk,fr,es,pt
      - LT_DISABLE_WEB_UI=false
    restart: unless-stopped
    networks: [safepassage]

  loki:
    image: grafana/loki:2.9.0
    container_name: safepassage_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks: [safepassage]

  promtail:
    image: grafana/promtail:2.9.0
    container_name: safepassage_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]
    restart: unless-stopped
    networks: [safepassage]

  grafana:
    image: grafana/grafana:10.2.0
    container_name: safepassage_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=safepassage_grafana
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [loki]
    restart: unless-stopped
    networks: [safepassage]
volumes:
  postgres_data:
  redis_data:
  grafana_data:
networks:
  safepassage:
    driver: bridge
