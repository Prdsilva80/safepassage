services:

  api:
    build: .
    container_name: safepassage_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [safepassage]

  postgres:
    image: postgres:16-alpine
    container_name: safepassage_postgres
    environment:
      POSTGRES_DB: safepassage
      POSTGRES_USER: safepassage
      POSTGRES_PASSWORD: safepassage_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepassage -d safepassage"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks: [safepassage]

  redis:
    image: redis:7-alpine
    container_name: safepassage_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks: [safepassage]

volumes:
  postgres_data:
  redis_data:

networks:
  safepassage:
    driver: bridge
